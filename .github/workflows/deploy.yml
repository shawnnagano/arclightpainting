name: Build, Prerender, Audit, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate redirect file
        run: npm run generate:redirects

      - name: Build base Vite artifact
        run: npm run build:base

      - name: Upload base dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-base
          path: dist
          if-no-files-found: error

  prerender:
    runs-on: ubuntu-latest
    needs: install-and-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download base dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-base
          path: dist

      - name: Prerender static HTML from built dist
        run: npm run prerender

      - name: Upload prerendered dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prerendered
          path: dist
          if-no-files-found: error

  seo-assertions:
    runs-on: ubuntu-latest
    needs: prerender
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download prerendered dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-prerendered
          path: dist

      - name: Validate redirect source of truth
        run: npm run generate:redirects

      - name: Run strict SEO assertions
        run: npm run audit:seo

      - name: Upload audited dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-audited
          path: dist
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: seo-assertions
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download audited dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-audited
          path: dist

      - name: Deploy prebuilt artifact to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name arclightpainting